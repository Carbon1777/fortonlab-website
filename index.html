<body>

  <main>

    <section class="hero" aria-labelledby="hero-mission">
      <img class="hero__banner" src="assets/hero-banner.webp" alt="Forton Lab — Студия мобильных приложений" width="1600" height="900">
      <p class="hero__mission" id="hero-mission">
        Делаем продукты,<br>
        которыми хочется пользоваться каждый день.
      </p>
    </section>

    <section class="products" aria-label="Продукты студии">

      <article class="product product--left">
        <div class="product__icon-wrap">
          <img class="product__icon" src="assets/centry-icon.png" alt="Centry" width="120" height="120">
        </div>
        <div class="product__body">
          <h2 class="product__name">Centry</h2>
          <p class="product__tagline">Открывайте новые места вместе</p>
          <a class="product__cta" href="https://centryweb.ru" target="_blank" rel="noopener noreferrer">
            Сайт продукта <span aria-hidden="true">→</span>
          </a>
        </div>
      </article>

      <article class="product">
        <div class="product__icon-wrap">
          <img class="product__icon" src="assets/diktum-icon.png" alt="Diktum" width="120" height="120">
        </div>
        <div class="product__body">
          <h2 class="product__name">Diktum</h2>
          <p class="product__tagline">Говори уверенно</p>
          <a class="product__cta" href="https://diktumweb.ru" target="_blank" rel="noopener noreferrer">
            Сайт продукта <span aria-hidden="true">→</span>
          </a>
        </div>
      </article>

    </section>

    <section class="soon" aria-label="Скоро">
      <p>Готовим новые приложения. Подпишись на каналы — узнаешь первым.</p>
    </section>
